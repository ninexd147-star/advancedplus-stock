<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ – AdvancedPlus Cloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDRYv-TvumnUrEqO2vUZ2YtFapACxYHklc",
      authDomain: "advancedplus-stock-b001e.firebaseapp.com",
      projectId: "advancedplus-stock-b001e",
      storageBucket: "advancedplus-stock-b001e.firebasestorage.app",
      messagingSenderId: "638897001944",
      appId: "1:638897001944:web:6d2fa196e78661fb310ead"
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #f5f5f7; font-family: 'IBM Plex Sans Thai', sans-serif;
      color: #1a1a2e; margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    /* dot grid background */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,87,34,.08) 1px, transparent 1px);
      background-size: 24px 24px; pointer-events: none;
    }

    /* orange glow */
    body::after {
      content: ''; position: fixed; top: -160px; right: -160px; z-index: 0;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,87,34,.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px; padding: 24px;
    }

    /* logo area */
    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-icon {
      width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 14px;
      background: linear-gradient(135deg, #ff5722, #ff7043);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(255,87,34,.35);
    }
    .logo-icon svg { width: 26px; height: 26px; color: #fff; }
    .logo-brand { font-size: 1.1rem; font-weight: 800; letter-spacing: .04em; color: #1a1a2e; }
    .logo-brand span { color: #ff5722; }
    .logo-sub { font-size: .7rem; color: #9ca3af; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; margin-top: 4px; }

    /* card */
    .card {
      background: #fff; border: 1px solid #ececec;
      border-radius: 20px; padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
    }
    .card-title { font-size: 1.15rem; font-weight: 800; color: #1a1a2e; margin-bottom: 6px; }
    .card-sub { font-size: .78rem; color: #9ca3af; margin-bottom: 28px; }

    /* field */
    .field-label { font-size: .68rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: #9ca3af; margin-bottom: 7px;
      display: flex; align-items: center; gap: 5px; }
    .field-wrap { position: relative; margin-bottom: 18px; }
    .field {
      width: 100%; background: #fafafa; border: 1.5px solid #e8e8e8;
      border-radius: 10px; color: #1a1a2e; padding: 11px 14px; font-size: .9rem;
      font-family: 'IBM Plex Sans Thai', sans-serif;
      transition: border-color .2s, box-shadow .2s, background .2s; outline: none;
    }
    .field:focus { background: #fff; border-color: #ff5722; box-shadow: 0 0 0 3px rgba(255,87,34,.1); }
    .field::placeholder { color: #c4c4cc; }

    /* password toggle */
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #9ca3af;
      padding: 4px; transition: color .15s;
    }
    .pw-toggle:hover { color: #ff5722; }

    /* error */
    .error-box {
      background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px;
      padding: 10px 14px; font-size: .8rem; color: #dc2626; font-weight: 500;
      margin-bottom: 18px; display: none; align-items: center; gap: 8px;
    }
    .error-box.show { display: flex; }

    /* submit button */
    .btn-login {
      width: 100%; background: linear-gradient(135deg, #ff5722, #ff7043);
      color: #fff; font-weight: 700; font-size: .95rem; border: none;
      border-radius: 11px; padding: 13px; cursor: pointer;
      font-family: 'IBM Plex Sans Thai', sans-serif;
      box-shadow: 0 4px 18px rgba(255,87,34,.35);
      transition: transform .15s, box-shadow .15s, opacity .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255,87,34,.45); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* spinner */
    .spin { display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* footer note */
    .login-footer { text-align: center; margin-top: 20px; font-size: .7rem; color: #c4c4cc; }

    /* loading overlay (while checking auth state) */
    #auth-check {
      position: fixed; inset: 0; background: #f5f5f7;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 999; gap: 14px;
    }
    #auth-check .spin { width: 28px; height: 28px; border-color: #ffccbc; border-top-color: #ff5722; }
    #auth-check p { font-size: .82rem; color: #9ca3af; font-weight: 500; }
  
    @media (max-width: 480px) {
      .login-wrap { padding: 16px; }
      .card { padding: 24px 20px; border-radius: 16px; }
      .logo-icon { width: 44px; height: 44px; }
      .logo-brand { font-size: 1rem; }
      .field { font-size: .95rem; padding: 12px 14px; }
      .btn-login { padding: 14px; font-size: 1rem; }
    }
</style>
</head>
<body>

  <!-- Auth check overlay -->
  <div id="auth-check">
    <div class="spin"></div>
    <p>กำลังตรวจสอบ…</p>
  </div>

  <!-- Login Card -->
  <div class="login-wrap" id="login-card" style="display:none">
    <div class="logo-area">
      <div class="logo-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/>
        </svg>
      </div>
      <div class="logo-brand">AdvancedPlus <span>Cloud</span></div>
      <div class="logo-sub">Inventory Management System</div>
    </div>

    <div class="card">
      <div class="card-title">เข้าสู่ระบบ</div>
      <div class="card-sub">กรอก Email และรหัสผ่านของคุณเพื่อเข้าใช้งาน</div>

      <!-- Error Box -->
      <div class="error-box" id="error-box">
        <svg style="width:16px;height:16px;flex-shrink:0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span id="error-msg">เกิดข้อผิดพลาด</span>
      </div>

      <!-- Email -->
      <div>
        <div class="field-label">
          <svg style="width:12px;height:12px" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
          Email
        </div>
        <div class="field-wrap">
          <input id="email" type="email" class="field" placeholder="your@email.com" autocomplete="username" />
        </div>
      </div>

      <!-- Password -->
      <div>
        <div class="field-label">
          <svg style="width:12px;height:12px" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          รหัสผ่าน
        </div>
        <div class="field-wrap">
          <input id="password" type="password" class="field" placeholder="••••••••" autocomplete="current-password" style="padding-right:42px" />
          <button class="pw-toggle" type="button" onclick="togglePw()" id="pw-toggle-btn">
            <svg id="eye-icon" style="width:18px;height:18px" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-login" id="login-btn" onclick="doLogin()">
        เข้าสู่ระบบ
      </button>
    </div>

    <div class="login-footer">AdvancedPlus Cloud · Inventory System · v1.0</div>
  </div>

  <script>
    // ── Check auth state first ───────────────────────────────────────────────
    firebase.auth().onAuthStateChanged(user => {
      document.getElementById('auth-check').style.display = 'none';
      if (user) {
        // Already logged in → go to dashboard
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('login-card').style.display = 'block';
      }
    });

    // ── Login ────────────────────────────────────────────────────────────────
    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');

      hideError();

      if (!email || !password) {
        showError('กรุณากรอก Email และรหัสผ่าน');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spin"></div> กำลังเข้าสู่ระบบ…';

      try {
        await firebase.auth().signInWithEmailAndPassword(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = 'เข้าสู่ระบบ';
        showError(mapError(err.code));
      }
    }

    // ── Error messages in Thai ───────────────────────────────────────────────
    function mapError(code) {
      const map = {
        'auth/invalid-email':       'รูปแบบ Email ไม่ถูกต้อง',
        'auth/user-not-found':      'ไม่พบบัญชีผู้ใช้นี้',
        'auth/wrong-password':      'รหัสผ่านไม่ถูกต้อง',
        'auth/invalid-credential':  'Email หรือรหัสผ่านไม่ถูกต้อง',
        'auth/too-many-requests':   'ลองหลายครั้งเกินไป กรุณารอสักครู่แล้วลองใหม่',
        'auth/network-request-failed': 'ไม่สามารถเชื่อมต่อได้ ตรวจสอบอินเทอร์เน็ต',
      };
      return map[code] || 'เกิดข้อผิดพลาด (' + code + ')';
    }

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-box').classList.add('show');
    }
    function hideError() {
      document.getElementById('error-box').classList.remove('show');
    }

    // ── Toggle Password ──────────────────────────────────────────────────────
    function togglePw() {
      const pw = document.getElementById('password');
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      document.getElementById('eye-icon').innerHTML = show
        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>'
        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
    }

    // ── Enter key ────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
