<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inbound – AdvancedPlus Cloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:   { DEFAULT: '#0f1c3f', 800: '#162246', 700: '#1e2f5a', 600: '#263971', 500: '#3a5298' },
            ember:  { DEFAULT: '#FF6D00', 400: '#FF8C00', 300: '#FFA726', 100: '#FFF3E0' },
          },
          fontFamily: {
            sans: ['IBM Plex Sans Thai', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    };
  </script>

  <style>
    body { background: #0b1530; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,109,0,.08) 1px, transparent 1px);
      background-size: 28px 28px; pointer-events: none;
    }
    .panel {
      background: linear-gradient(145deg, rgba(22,34,70,.92), rgba(15,28,63,.95));
      border: 1px solid rgba(255,109,0,.15); backdrop-filter: blur(12px);
    }
    .field {
      width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px; color: #e8ecf5; padding: .6rem .9rem; font-size: .9rem; outline: none;
    }
    .field:focus { border-color: #FF6D00; box-shadow: 0 0 0 3px rgba(255,109,0,.1); }
    
    /* แก้ไขช่อง S/N ให้พิมพ์ง่ายและรองรับเครื่องยิง */
    #sn-field { 
      background: rgba(255,255,255,.08); 
      border: 1px solid rgba(255,109,0,.3); 
      font-size: 1.2rem; 
      font-family: 'JetBrains Mono', monospace; 
      color: #fff;
    }
    
    .field-label { font-size: .75rem; font-weight: 600; color: rgba(255,255,255,.4); margin-bottom: .35rem; text-transform: uppercase; }
    .btn-add { background: linear-gradient(135deg, #FF6D00, #FF8C00); color: #fff; font-weight: 700; border-radius: 10px; padding: .75rem; width: 100%; transition: all .2s; cursor: pointer; border: none; }
    .btn-add:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,109,0,.4); }
    .btn-save { background: transparent; border: 2px solid #FF6D00; color: #FF6D00; font-weight: 700; border-radius: 12px; padding: .9rem; width: 100%; transition: all .2s; }
    .btn-save:hover:not(:disabled) { background: #FF6D00; color: #fff; }
    .btn-save:disabled { opacity: .3; cursor: not-allowed; }
    
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: rgba(255,109,0,.1); color: #FF6D00; font-size: .7rem; padding: .7rem; text-align: left; }
    .data-table td { padding: .7rem; font-size: .85rem; border-bottom: 1px solid rgba(255,255,255,.05); }
    
    #toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 999; background: #162246; border: 1px solid #FF6D00; color: #fff; padding: .8rem 1.5rem; border-radius: 10px; opacity: 0; transform: translateY(100%); transition: all .3s; }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body class="font-sans min-h-screen text-white relative">

  <header class="relative z-10 border-b border-white/5 bg-navy/60 backdrop-blur-md">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-8 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-sm font-bold uppercase tracking-widest">AdvancedPlus <span class="text-ember">Cloud</span></span>
      </div>
      <nav class="flex gap-6">
        <a href="index.html" class="text-xs font-bold uppercase text-ember border-b-2 border-ember pb-1">Inbound</a>
        <a href="inventory.html" class="text-xs font-bold uppercase text-white/40 hover:text-white transition-colors">Dashboard</a>
      </nav>
      <div class="text-xs text-white/40 font-bold uppercase">Warehouse Mode</div>
    </div>
  </header>

  <main class="relative z-10 max-w-screen-xl mx-auto px-4 sm:px-8 py-6">
    <div class="mb-6 flex justify-between items-end">
      <div>
        <p class="text-[10px] uppercase tracking-widest text-ember font-bold mb-1">Stock Control</p>
        <h1 class="text-2xl font-bold">บันทึกรับสินค้าเข้า</h1>
      </div>
      <div class="text-[10px] text-white/30 font-mono" id="todayDate"></div>
    </div>

    <div class="grid gap-6" style="grid-template-columns: 380px 1fr;">
      <div class="panel rounded-2xl p-6 flex flex-col gap-4 h-fit">
        <div>
          <label class="field-label">Model</label>
          <input list="model-list" id="model" class="field" placeholder="เลือกหรือพิมพ์ชื่อรุ่น..." />
          <datalist id="model-list"></datalist>
        </div>

        <div>
          <label class="field-label">Serial Number (S/N)</label>
          <input id="sn-field" class="field" placeholder="สแกนหรือพิมพ์ S/N ที่นี่..." autocomplete="off" />
        </div>

        <div>
          <label class="field-label">Supplier</label>
          <input list="supplier-list" id="supplier" class="field" placeholder="เลือก Supplier..." />
          <datalist id="supplier-list"></datalist>
        </div>

        <div>
          <label class="field-label">Invoice No.</label>
          <input id="invoice" class="field font-mono" placeholder="เลขที่ใบส่งของ..." />
        </div>

        <div>
          <label class="field-label">หมายเหตุ</label>
          <textarea id="note" class="field resize-none" rows="2"></textarea>
        </div>

        <button class="btn-add" onclick="addToStaged()">เพิ่มรายการ (Enter)</button>
      </div>

      <div class="flex flex-col gap-4">
        <div class="panel rounded-2xl overflow-hidden flex flex-col flex-1">
          <div class="px-6 py-4 border-b border-white/5 flex justify-between items-center">
            <h2 class="text-xs font-bold uppercase text-white/50">รายการพักรอบันทึก <span id="count-badge" class="ml-2 text-ember">0</span></h2>
            <button onclick="clearAll()" class="text-[10px] text-red-400 font-bold hover:underline uppercase">ล้างทั้งหมด</button>
          </div>
          <div class="overflow-auto max-h-[400px]">
            <table class="data-table">
              <thead><tr><th>#</th><th>Model</th><th>S/N</th><th>Supplier</th><th>Invoice</th><th style="width:40px"></th></tr></thead>
              <tbody id="staged-tbody"></tbody>
            </table>
            <div id="empty-state" class="py-20 text-center text-white/10 text-xs font-bold uppercase">ยังไม่มีข้อมูล...</div>
          </div>
        </div>

        <div class="panel rounded-2xl px-6 py-4 flex items-center gap-6">
          <div class="flex-1">
            <p class="text-[10px] text-white/30 font-bold uppercase">Total Items</p>
            <p class="text-2xl font-bold" id="summary-count">0</p>
          </div>
          <button id="save-btn" class="btn-save sm:w-64" onclick="saveToFirebase()" disabled>บันทึกขึ้นคลาวด์ ✅</button>
        </div>
      </div>
    </div>
  </main>

  <div id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDKnlB-dWr60Aanaa5g9Av7NdB9pIutcnw",
      authDomain: "advancedplus-stock.firebaseapp.com",
      projectId: "advancedplus-stock",
      storageBucket: "advancedplus-stock.firebasestorage.app",
      messagingSenderId: "406022848223",
      appId: "1:406022848223:web:0d625edcb7720d1d6db36a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let stagedData = [];

    // โหลดตัวเลือกจาก Firebase
    async function loadConfig() {
      try {
        const snap = await getDoc(doc(db, "system_settings", "dropdowns"));
        if (snap.exists()) {
          const d = snap.data();
          document.getElementById('model-list').innerHTML = d.models.map(m => `<option value="${m}">`).join('');
          document.getElementById('supplier-list').innerHTML = d.suppliers.map(s => `<option value="${s}">`).join('');
        }
      } catch (e) { console.error(e); }
    }
    loadConfig();

    // ฟังก์ชันเพิ่มลงตารางพัก
    window.addToStaged = () => {
      const snF = document.getElementById('sn-field');
      const sn = snF.value.trim();
      if(!sn) { showToast("⚠️ กรุณาใส่ S/N"); snF.focus(); return; }
      
      if(stagedData.some(x => x.sn === sn)) {
        showToast("🔁 S/N นี้มีอยู่แล้ว"); snF.value = ''; snF.focus(); return;
      }

      stagedData.push({
        id: Date.now(),
        model: document.getElementById('model').value || '-',
        sn: sn,
        supplier: document.getElementById('supplier').value || '-',
        invoice: document.getElementById('invoice').value || '-',
        note: document.getElementById('note').value || ''
      });

      snF.value = '';
      snF.focus();
      render();
    };

    // บันทึกขึ้น Firebase (โครงสร้าง 9 ช่อง)
    window.saveToFirebase = async () => {
      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      showToast("⏳ กำลังบันทึกข้อมูล...");

      try {
        const promises = stagedData.map(item => {
          return addDoc(collection(db, "inbound_stock"), {
            date_in: serverTimestamp(),
            order_number: "", 
            model: item.model,
            sn: item.sn,
            duration: 0,
            last_updated: serverTimestamp(),
            supplier: item.supplier,
            invoice: item.invoice,
            note: item.note
          });
        });

        await Promise.all(promises);
        showToast("🔥 บันทึกเข้าฐานข้อมูลสำเร็จ!");
        stagedData = [];
        render();
      } catch (e) {
        showToast("❌ เกิดข้อผิดพลาด!");
        btn.disabled = false;
      }
    };

    function render() {
      const tb = document.getElementById('staged-tbody');
      const em = document.getElementById('empty-state');
      em.style.display = stagedData.length ? 'none' : 'block';
      tb.innerHTML = stagedData.map((r, i) => `
        <tr>
          <td class="text-white/20 font-mono text-[10px]">${i+1}</td>
          <td>${r.model}</td>
          <td class="font-mono text-ember font-bold">${r.sn}</td>
          <td>${r.supplier}</td>
          <td class="font-mono text-[10px] opacity-40">${r.invoice}</td>
          <td><button onclick="del(${r.id})" class="text-red-400">✕</button></td>
        </tr>`).join('');
      
      document.getElementById('count-badge').textContent = stagedData.length;
      document.getElementById('summary-count').textContent = stagedData.length;
      document.getElementById('save-btn').disabled = !stagedData.length;
    }

    window.del = (id) => { stagedData = stagedData.filter(x => x.id !== id); render(); };
    window.clearAll = () => { if(confirm("ลบทั้งหมด?")) { stagedData = []; render(); } };
    function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    
    // ดักจับ Enter สำหรับมือพิมพ์และเครื่องยิง
    document.getElementById('sn-field').onkeydown = e => { if(e.key === 'Enter') window.addToStaged(); };
    document.getElementById('todayDate').textContent = new Date().toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric' });
    render();
  </script>
</body>
</html>
